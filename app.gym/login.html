<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GetGym — Iniciar sesión</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',system-ui,-apple-system,sans-serif;background:#fdf6e9;color:#1a1a1a;line-height:1.6;min-height:100vh;display:flex;flex-direction:column}
a{text-decoration:none;color:inherit}

/* NAVBAR */
.navbar{position:sticky;top:0;z-index:100;background:#fdf6e9;border-bottom:1px solid #e5e7eb;padding:16px 0}
.navbar .container{max-width:1100px;margin:0 auto;padding:0 20px;display:flex;align-items:center;justify-content:space-between}
.navbar-logo{font-size:20px;font-weight:700;color:#1a1a1a}
.navbar-logo span{color:#d97706}
.navbar-back{font-size:14px;color:#6b7280;font-weight:500;display:flex;align-items:center;gap:6px;transition:color .2s}
.navbar-back:hover{color:#1a1a1a}

/* AUTH CONTAINER */
.auth-wrapper{flex:1;display:flex;align-items:center;justify-content:center;padding:40px 20px}
.auth-card{width:100%;max-width:400px;text-align:center}
.auth-eyebrow{font-size:12px;font-weight:600;color:#d97706;text-transform:uppercase;letter-spacing:1px;margin-bottom:12px}
.auth-title{font-size:32px;font-weight:600;letter-spacing:-.5px;margin-bottom:8px}
.auth-toggle{font-size:14px;color:#6b7280;margin-bottom:32px}
.auth-toggle a{color:#d97706;font-weight:500;cursor:pointer}
.auth-toggle a:hover{text-decoration:underline}

/* FORM */
.auth-form{text-align:left}
.form-group{margin-bottom:16px}
.form-group label{display:block;font-size:13px;font-weight:500;margin-bottom:6px;color:#1a1a1a}
.form-group input{width:100%;padding:12px 14px;font-size:14px;font-family:inherit;border:1px solid #d1d5db;border-radius:8px;background:#fff;color:#1a1a1a;outline:none;transition:border-color .2s}
.form-group input:focus{border-color:#d97706}
.password-wrapper{position:relative}
.password-wrapper input{padding-right:44px}
.password-toggle{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;font-size:16px;color:#6b7280;padding:4px}
.form-link{display:block;text-align:right;font-size:13px;color:#d97706;font-weight:500;margin-top:8px;margin-bottom:24px}
.form-link:hover{text-decoration:underline}

/* BUTTONS */
.btn-primary{width:100%;padding:14px;font-size:15px;font-weight:500;color:#fff;background:#111;border:none;border-radius:10px;cursor:pointer;transition:background .2s;margin-bottom:24px}
.btn-primary:hover{background:#333}

/* DIVIDER */
.divider{display:flex;align-items:center;gap:12px;margin-bottom:24px}
.divider::before,.divider::after{content:"";flex:1;height:1px;background:#e5e7eb}
.divider span{font-size:13px;color:#6b7280;white-space:nowrap}

/* GOOGLE BUTTON */
.btn-google{width:100%;padding:14px;font-size:14px;font-weight:500;color:#1a1a1a;background:#fff;border:1px solid #d1d5db;border-radius:10px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;transition:border-color .2s}
.btn-google:hover{border-color:#1a1a1a}
.btn-google svg{width:18px;height:18px}

/* HIDE */
.hidden{display:none}
</style>
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar">
  <div class="container">
    <a href="index.html" class="navbar-logo">Get<span>Gym</span></a>
    <a href="index.html" class="navbar-back">← Volver al inicio</a>
  </div>
</nav>

<!-- AUTH -->
<div class="auth-wrapper">
  <div class="auth-card">

    <!-- LOGIN VIEW -->
    <div id="login-view">
      <div class="auth-eyebrow">Bienvenido de vuelta</div>
      <h1 class="auth-title">Iniciá sesión</h1>
      <p class="auth-toggle">¿Sos nuevo? <a onclick="showRegister()">Creá una cuenta</a></p>

      <form class="auth-form" onsubmit="return false">
        <div class="form-group">
          <label>Email</label>
          <input type="email" placeholder="tu@email.com">
        </div>
        <div class="form-group">
          <label>Contraseña</label>
          <div class="password-wrapper">
            <input type="password" placeholder="••••••••" id="login-pass">
            <button type="button" class="password-toggle" onclick="togglePass('login-pass')">👁</button>
          </div>
        </div>
        <a class="form-link" href="#">¿Olvidaste tu contraseña?</a>
        <button type="submit" class="btn-primary">Iniciar sesión</button>
      </form>

      <div class="divider"><span>o continuá con</span></div>
      <button class="btn-google">
        <svg viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
        Continuar con Google
      </button>
    </div>

    <!-- REGISTER VIEW -->
    <div id="register-view" class="hidden">
      <div class="auth-eyebrow">Empezá hoy gratis</div>
      <h1 class="auth-title">Creá tu cuenta</h1>
      <p class="auth-toggle">¿Ya tenés cuenta? <a onclick="showLogin()">Iniciá sesión</a></p>

      <form class="auth-form" onsubmit="return false">
        <div class="form-group">
          <label>Nombre</label>
          <input type="text" placeholder="Tu nombre">
        </div>
        <div class="form-group">
          <label>Email</label>
          <input type="email" placeholder="tu@email.com">
        </div>
        <div class="form-group">
          <label>Contraseña</label>
          <div class="password-wrapper">
            <input type="password" placeholder="••••••••" id="reg-pass">
            <button type="button" class="password-toggle" onclick="togglePass('reg-pass')">👁</button>
          </div>
        </div>
        <div class="form-group">
          <label>Confirmar contraseña</label>
          <div class="password-wrapper">
            <input type="password" placeholder="••••••••" id="reg-pass2">
            <button type="button" class="password-toggle" onclick="togglePass('reg-pass2')">👁</button>
          </div>
        </div>
        <button type="submit" class="btn-primary" style="margin-top:8px">Crear cuenta gratis</button>
      </form>

      <div class="divider"><span>o continuá con</span></div>
      <button class="btn-google">
        <svg viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
        Continuar con Google
      </button>
    </div>

  </div>
</div>

<script>
function showRegister(){
  document.getElementById('login-view').classList.add('hidden');
  document.getElementById('register-view').classList.remove('hidden');
}
function showLogin(){
  document.getElementById('register-view').classList.add('hidden');
  document.getElementById('login-view').classList.remove('hidden');
}
function togglePass(id){
  var el=document.getElementById(id);
  el.type=el.type==='password'?'text':'password';
}
</script>
</body>
</html>
